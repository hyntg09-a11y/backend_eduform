<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUFORM  Iniciar sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{min-height:100vh;background:linear-gradient(135deg,#141e30,#243b55);display:flex;align-items:center;justify-content:center;font-family:Arial}
.card{width:400px;border:none;border-radius:16px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo-box{width:36px;height:36px;background:#4f46e5;border-radius:8px;display:flex;align-items:center;justify-content:center}
.input-group-text{background:transparent;border-right:none;border-color:#dee2e6}
.form-control{border-left:none;border-color:#dee2e6;padding:10px 12px}
.form-control:focus{box-shadow:none;border-color:#4f46e5}
.input-group:focus-within .input-group-text{border-color:#4f46e5}
.btn-login{background:#4f46e5;border:none;padding:11px;font-weight:500;letter-spacing:0.02em}
.btn-login:hover{background:#4338ca}
</style>
</head>
<body>
<div class="card bg-white">
  <div class="text-center mb-4">
    <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
      <div class="logo-box"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 5.5V10.5L8 14L2 10.5V5.5L8 2Z" fill="white"/></svg></div>
      <span class="fw-bold fs-5 text-dark" style="letter-spacing:0.05em">EDUFORM</span>
    </div>
    <h5 class="fw-bold mb-1">Bienvenido</h5>
    <p class="text-muted small mb-0">Ingresa a tu cuenta para continuar</p>
  </div>
  {% if error %}<div class="alert alert-danger small py-2">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label small fw-semibold text-secondary">Usuario</label>
      <div class="input-group">
        <span class="input-group-text"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#6c757d" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#6c757d" stroke-width="1.5" stroke-linecap="round"/></svg></span>
        <input type="text" name="username" class="form-control" placeholder="tu_usuario" required>
      </div>
    </div>
    <div class="mb-4">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label class="form-label small fw-semibold text-secondary mb-0">Contraseña</label>
      </div>
      <div class="input-group">
        <span class="input-group-text"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="#6c757d" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="#6c757d" stroke-width="1.5" stroke-linecap="round"/></svg></span>
        <input type="password" name="password" class="form-control" placeholder="" required>
      </div>
    </div>
    <button type="submit" class="btn btn-login btn-primary w-100 text-white">Ingresar</button>
  </form>
  <p class="text-center small text-muted mt-3 mb-0">¿No tienes cuenta? <a href="{% url 'registro' %}" style="color:#4f46e5;text-decoration:none;font-weight:500">Regístrate aquí</a></p>
</div>
</body>
</html>
