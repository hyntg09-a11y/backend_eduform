<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Usuario — EDUFORM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f0f4f8;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:white;border-radius:16px;padding:2.5rem;width:460px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.card-title{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:0.25rem}
.card-sub{font-size:14px;color:#6c757d;margin-bottom:2rem}
.field-label{font-size:12px;font-weight:600;color:#6c757d;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
input{width:100%;padding:10px 14px;font-size:14px;border:1px solid #dee2e6;border-radius:8px;background:#f8f9fa;color:#111;margin-bottom:1.25rem;box-sizing:border-box}
input:focus{border-color:#4f46e5;outline:none;background:white}
.btn-save{width:100%;padding:12px;background:#4f46e5;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:1rem}
.btn-save:hover{background:#4338ca}
.btn-cancel{display:block;text-align:center;font-size:14px;color:#6c757d;text-decoration:none}
.btn-cancel:hover{color:#333}
</style>
</head>
<body>
<div class="card">
  <div class="card-title">Editar usuario</div>
  <div class="card-sub">Modificando: <strong>{{ u.username }}</strong></div>
  <form method="post">
    {% csrf_token %}
    <label class="field-label">Nombre</label>
    <input type="text" name="nombre" value="{{ u.first_name }}" placeholder="Nombre">
    <label class="field-label">Apellido</label>
    <input type="text" name="apellido" value="{{ u.last_name }}" placeholder="Apellido">
    <button type="submit" class="btn-save">Guardar cambios</button>
    <a href="{% url 'admin_panel' %}" class="btn-cancel">Cancelar</a>
  </form>
</div>
</body>
</html>
